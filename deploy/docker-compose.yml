services:
  app:
    image: ${IMAGE_NAME:-rabc-go}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-rabc-go}
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env.production
    environment:
      APP_CONF: /app/config/prod.yml
      TZ: Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
