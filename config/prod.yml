env: prod

http:
  host: 0.0.0.0
  port: 8000

# 生产配置读取优先级：APP_* 环境变量 > 本文件。
# 可把敏感值通过环境变量注入；若环境变量不存在，则读取本文件中的值。
# prod 必填项缺失时，应用会在启动期 panic，避免空 JWT key / 空 DSN 带病上线。
#
# 环境变量映射（前缀 APP，点号 → 下划线）：
#   APP_SECURITY_JWT_KEY               JWT 签名密钥（必填）
#   APP_SECURITY_JWT_ACCESS_TTL        Access Token TTL（默认 30m）
#   APP_SECURITY_JWT_REFRESH_TTL       Refresh Token TTL（默认 168h = 7d）
#   APP_SECURITY_AUTH_ROTATION_TOMB_TTL 轮换墓碑 TTL（默认 30m，上限 refresh_ttl）
#   APP_DATA_DB_USER_DRIVER            业务库驱动（默认 mysql，可选 postgres/sqlite/sqlserver）
#   APP_DATA_DB_USER_DSN               业务库 DSN
#   APP_DATA_REDIS_ADDR                Redis 地址
#   APP_DATA_REDIS_PASSWORD            Redis 密码
#   APP_DATA_REDIS_DB                  Redis DB 编号
#   APP_SEED_INITIAL_PASSWORD          首次 seed 写入的 admin 初始密码
security:
  api_sign:
    app_key: ""
    app_security: ""
  jwt:
    key: ""
    # access 仅验签；refresh 存 Redis，支持服务端吊销
    access_ttl: 30m
    refresh_ttl: 168h
  auth:
    # 墓碑用于识别已轮换 refresh token 的复用；实际生效值不超过 refresh_ttl
    rotation_tomb_ttl: 30m

data:
  db:
    # 生产默认关闭 SQL 调试日志，避免把含 PII 的 SQL/参数无差别落盘；
    # 排查时可临时通过 APP_DATA_DB_DEBUG=true 注入开启
    debug: false
    user:
      driver: mysql
      dsn: ""
  redis:
    addr: ""
    password: ""
    db: 0
    read_timeout: 0.2s
    write_timeout: 0.2s

seed:
  initial_password: ""

log:
  log_level: info          # debug | info | warn | error
  encoding: json           # json | console
  log_file_name: "./storage/logs/server.log"
  max_backups: 30          # 保留旧日志文件数
  max_age: 7               # 日志保留天数
  max_size: 1024           # 单文件大小上限（MB）
  compress: true
  request:
    headers:
      # 生产默认关闭请求头打印；调试时可临时通过 APP_LOG_REQUEST_HEADERS_ENABLED=true 注入
      enabled: false
    body:
      # 生产默认关闭请求体打印，避免 PII 与日志膨胀
      enabled: false
  response:
    body:
      # 生产默认关闭响应体打印，避免 PII 与日志膨胀
      enabled: false
  body:
    # 启用时单条 body 写入日志的字节上限；超出时记 [truncated ...] 占位，不写原文
    max_bytes: 8192
