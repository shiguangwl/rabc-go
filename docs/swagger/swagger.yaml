      parameters:
      - description: 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rabc-go_api_apiv1.AdminUserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 更新管理员用户
      tags:
      - 用户模块
  /v1/admin/user/permissions:
    get:
      consumes:
      - application/json
      description: 获取当前用户的权限列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.GetUserPermissionsData'
      security:
      - Bearer: []
      summary: 获取用户权限
      tags:
      - 权限模块
