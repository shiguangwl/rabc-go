        example: admin
        type: string
    required:
    - list
    - role
    type: object
  rabc-go_api_apiv1.UserSessionItem:
    properties:
      exp:
        description: Unix 秒级失效时间。
        type: integer
      sid:
        type: string
    type: object
host: localhost:8000
info:
  contact: {}
  description: RBAC 管理后台接口，覆盖登录认证、菜单/API 权限、角色授权与管理员管理。
  title: RABC-Go Admin API
  version: 1.0.0
paths:
  /v1/admin/api:
    delete:
      consumes:
      - application/json
      description: 删除指定API
      parameters:
      - description: API ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 删除API
      tags:
      - API模块
    post:
      consumes:
      - application/json
      description: 创建新的API
      parameters:
      - description: 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rabc-go_api_apiv1.APICreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 创建API
      tags:
      - API模块
    put:
      consumes:
      - application/json
      description: 更新API信息
      parameters:
      - description: 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rabc-go_api_apiv1.APIUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 更新API
      tags:
      - API模块
  /v1/admin/apis:
    get:
      consumes:
      - application/json
      description: 获取API列表
      parameters:
      - description: 页码
        in: query
        name: page
        required: true
        type: integer
      - description: 每页数量
        in: query
        name: pageSize
        required: true
        type: integer
      - description: API分组
        in: query
        name: group
        type: string
      - description: API名称
        in: query
        name: name
        type: string
      - description: API路径
        in: query
        name: path
        type: string
      - description: 请求方法
        in: query
        name: method
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.GetApisResponse'
      security:
      - Bearer: []
      summary: 获取API列表
      tags:
      - API模块
  /v1/admin/menu:
    delete:
      consumes:
      - application/json
      description: 删除指定菜单
      parameters:
      - description: 菜单ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 删除菜单
      tags:
      - 菜单模块
    post:
      consumes:
      - application/json
      description: 创建新的菜单
      parameters:
      - description: 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rabc-go_api_apiv1.MenuCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 创建菜单
      tags:
      - 菜单模块
    put:
      consumes:
      - application/json
      description: 更新菜单信息
      parameters:
      - description: 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rabc-go_api_apiv1.MenuUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 更新菜单
      tags:
      - 菜单模块
  /v1/admin/menus:
    get:
      consumes:
      - application/json
      description: 获取管理员菜单列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.GetMenuResponse'
      security:
      - Bearer: []
      summary: 获取管理员菜单
      tags:
      - 菜单模块
  /v1/admin/role:
    delete:
      consumes:
      - application/json
      description: 删除指定角色
      parameters:
      - description: 角色ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 删除角色
      tags:
      - 角色模块
    post:
      consumes:
      - application/json
      description: 创建新的角色
      parameters:
      - description: 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rabc-go_api_apiv1.RoleCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 创建角色
      tags:
      - 角色模块
    put:
      consumes:
      - application/json
      description: 更新角色信息
      parameters:
      - description: 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rabc-go_api_apiv1.RoleUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 更新角色
      tags:
      - 角色模块
  /v1/admin/role/permission:
    put:
      consumes:
      - application/json
      description: 更新指定角色的权限列表
      parameters:
      - description: 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rabc-go_api_apiv1.UpdateRolePermissionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 更新角色权限
      tags:
      - 权限模块
  /v1/admin/role/permissions:
    get:
      consumes:
      - application/json
      description: 获取指定角色的权限列表
      parameters:
      - description: 角色名称
        in: query
        name: role
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.GetRolePermissionsData'
      security:
      - Bearer: []
      summary: 获取角色权限
      tags:
      - 权限模块
  /v1/admin/roles:
    get:
      consumes:
      - application/json
      description: 获取角色列表
      parameters:
      - description: 页码
        in: query
        name: page
        required: true
        type: integer
      - description: 每页数量
        in: query
        name: pageSize
        required: true
        type: integer
      - description: 角色ID
        in: query
        name: sid
        type: string
      - description: 角色名称
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.GetRolesResponse'
      security:
      - Bearer: []
      summary: 获取角色列表
      tags:
      - 角色模块
  /v1/admin/user:
    delete:
      consumes:
      - application/json
      description: 删除指定管理员用户
      parameters:
      - description: 用户ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.Response'
      security:
      - Bearer: []
      summary: 删除管理员用户
      tags:
      - 用户模块
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rabc-go_api_apiv1.GetAdminUserResponse'
      security:
      - Bearer: []
