definitions:
  rabc-go_api_apiv1.APICreateRequest:
    properties:
      group:
        example: 权限管理
        type: string
      method:
        enum:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
        example: GET
        type: string
      name:
        example: 菜单列表
        type: string
      path:
        example: /v1/test
        type: string
    required:
    - group
    - method
    - name
    - path
    type: object
  rabc-go_api_apiv1.APIDataItem:
    properties:
      createdAt:
        type: string
      group:
        type: string
      id:
        type: integer
      method:
        type: string
      name:
        type: string
      path:
        type: string
      updatedAt:
        type: string
    type: object
  rabc-go_api_apiv1.APIUpdateRequest:
    properties:
      group:
        example: 权限管理
        type: string
      id:
        example: 1
        type: integer
      method:
        enum:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
        example: GET
        type: string
      name:
        example: 菜单列表
        type: string
      path:
        example: /v1/test
        type: string
    required:
    - group
    - id
    - method
    - name
    - path
    type: object
  rabc-go_api_apiv1.AdminUserCreateRequest:
    properties:
      email:
        example: 1234@gmail.com
        type: string
      nickname:
        example: 小Baby
        type: string
      password:
        example: "123456"
        minLength: 6
        type: string
      phone:
        example: "1858888888"
        type: string
      roles:
        example:
        - ""
        items:
          type: string
        maxItems: 20
        type: array
      username:
        example: 张三
        type: string
    required:
    - password
    - username
    type: object
  rabc-go_api_apiv1.AdminUserDataItem:
    properties:
      createdAt:
        type: string
      email:
        example: 1234@gmail.com
        type: string
      id:
        type: integer
      lastLoginAt:
        type: string
      nickname:
        example: 小Baby
        type: string
      phone:
        example: "1858888888"
        type: string
      roles:
        example:
        - ""
        items:
          type: string
        type: array
      updatedAt:
        type: string
      username:
        example: 张三
        type: string
    type: object
  rabc-go_api_apiv1.AdminUserUpdateRequest:
    properties:
      email:
        example: 1234@gmail.com
        type: string
      id:
        example: 1
        type: integer
      nickname:
        example: 小Baby
        type: string
      password:
        example: "123456"
        minLength: 6
        type: string
      phone:
        example: "1858888888"
        type: string
      roles:
        example:
        - ""
        items:
          type: string
        type: array
      username:
        example: 张三
        type: string
    required:
    - id
    - username
    type: object
  rabc-go_api_apiv1.GetAdminUserResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/rabc-go_api_apiv1.GetAdminUserResponseData'
      message:
        type: string
    type: object
  rabc-go_api_apiv1.GetAdminUserResponseData:
    properties:
      createdAt:
        type: string
      email:
        example: 1234@gmail.com
        type: string
      id:
        type: integer
      lastLoginAt:
        type: string
      nickname:
        example: 小Baby
        type: string
      phone:
        example: "1858888888"
        type: string
      roles:
        example:
        - ""
        items:
          type: string
        type: array
      updatedAt:
        type: string
      username:
        example: 张三
        type: string
    type: object
  rabc-go_api_apiv1.GetAdminUsersResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/rabc-go_api_apiv1.GetAdminUsersResponseData'
      message:
        type: string
    type: object
  rabc-go_api_apiv1.GetAdminUsersResponseData:
    properties:
      list:
        items:
          $ref: '#/definitions/rabc-go_api_apiv1.AdminUserDataItem'
        type: array
      total:
        type: integer
    type: object
  rabc-go_api_apiv1.GetApisResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/rabc-go_api_apiv1.GetApisResponseData'
      message:
        type: string
    type: object
  rabc-go_api_apiv1.GetApisResponseData:
    properties:
      groups:
        items:
          type: string
        type: array
      list:
        items:
          $ref: '#/definitions/rabc-go_api_apiv1.APIDataItem'
        type: array
      total:
        type: integer
    type: object
  rabc-go_api_apiv1.GetMenuResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/rabc-go_api_apiv1.GetMenuResponseData'
      message:
        type: string
    type: object
  rabc-go_api_apiv1.GetMenuResponseData:
    properties:
      list:
        items:
          $ref: '#/definitions/rabc-go_api_apiv1.MenuDataItem'
        type: array
    type: object
  rabc-go_api_apiv1.GetRolePermissionsData:
    properties:
      list:
        items:
          type: string
        type: array
    type: object
  rabc-go_api_apiv1.GetRolesResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/rabc-go_api_apiv1.GetRolesResponseData'
      message:
        type: string
    type: object
  rabc-go_api_apiv1.GetRolesResponseData:
    properties:
      list:
        items:
          $ref: '#/definitions/rabc-go_api_apiv1.RoleDataItem'
        type: array
      total:
        type: integer
    type: object
  rabc-go_api_apiv1.GetUserPermissionsData:
    properties:
      list:
        items:
          type: string
        type: array
    type: object
  rabc-go_api_apiv1.GetUserSessionsResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/rabc-go_api_apiv1.GetUserSessionsResponseData'
      message:
        type: string
    type: object
  rabc-go_api_apiv1.GetUserSessionsResponseData:
    properties:
      list:
        items:
          $ref: '#/definitions/rabc-go_api_apiv1.UserSessionItem'
        type: array
    type: object
  rabc-go_api_apiv1.LoginRequest:
    properties:
      password:
        example: "123456"
        type: string
      username:
        example: 1234@gmail.com
        type: string
    required:
    - password
    - username
    type: object
  rabc-go_api_apiv1.LoginResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/rabc-go_api_apiv1.LoginResponseData'
      message:
        type: string
    type: object
  rabc-go_api_apiv1.LoginResponseData:
    properties:
      accessToken:
        type: string
      expiresIn:
        description: access token 剩余秒数。
        type: integer
      refreshToken:
        type: string
    type: object
  rabc-go_api_apiv1.LogoutRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  rabc-go_api_apiv1.MenuCreateRequest:
    properties:
      component:
        type: string
      hideInMenu:
        type: boolean
      icon:
        type: string
      keepAlive:
        type: boolean
      locale:
        type: string
      name:
        type: string
      parentId:
        type: integer
      path:
        type: string
      redirect:
        type: string
      title:
        type: string
      url:
        description: iframe URL 不能与 path 同时作为同一菜单的主跳转来源。
        type: string
      weight:
        type: integer
    required:
    - name
    - path
    - title
    type: object
  rabc-go_api_apiv1.MenuDataItem:
    properties:
      component:
        type: string
      hideInMenu:
        type: boolean
      icon:
        type: string
      id:
        type: integer
      keepAlive:
        type: boolean
      locale:
        type: string
      name:
        type: string
      parentId:
        type: integer
      path:
        type: string
      redirect:
        type: string
      title:
        type: string
      updatedAt:
        type: string
      url:
        description: iframe URL 不能与 path 同时作为同一菜单的主跳转来源。
        type: string
      weight:
        type: integer
    type: object
  rabc-go_api_apiv1.MenuUpdateRequest:
    properties:
      component:
        type: string
      hideInMenu:
        type: boolean
      icon:
        type: string
      id:
        type: integer
      keepAlive:
        type: boolean
      locale:
        type: string
      name:
        type: string
      parentId:
        type: integer
      path:
        type: string
      redirect:
        type: string
      title:
        type: string
      updatedAt:
        type: string
      url:
        description: iframe URL 不能与 path 同时作为同一菜单的主跳转来源。
        type: string
      weight:
        type: integer
    required:
    - id
    - name
    - path
    - title
    type: object
  rabc-go_api_apiv1.RefreshRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  rabc-go_api_apiv1.RefreshResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/rabc-go_api_apiv1.RefreshResponseData'
      message:
        type: string
    type: object
  rabc-go_api_apiv1.RefreshResponseData:
    properties:
      accessToken:
        type: string
      expiresIn:
        type: integer
      refreshToken:
        type: string
    type: object
  rabc-go_api_apiv1.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  rabc-go_api_apiv1.RoleCreateRequest:
    properties:
      name:
        example: Admin
        type: string
      sid:
        example: "1"
        type: string
    required:
    - name
    - sid
    type: object
  rabc-go_api_apiv1.RoleDataItem:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      sid:
        type: string
      updatedAt:
        type: string
    type: object
  rabc-go_api_apiv1.RoleUpdateRequest:
    properties:
      id:
        example: 1
